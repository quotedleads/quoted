<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --gold: #C9A84C;
    --gold-light: #F0D898;
    --gold-pale: #FDF6E3;
    --dark: #1A1209;
    --mid: #3D2B1F;
    --cream: #FAF7F2;
    --warm-white: #FFFDF9;
    --text: #2C1810;
    --muted: #7A6652;
    --border: rgba(201,168,76,0.2);
    --danger: #C0392B;
    --success: #1E8449;
    --info: #1A5276;
    --radius: 12px;
    --shadow: 0 4px 24px rgba(0,0,0,0.08);
  }
  html { scroll-behavior: smooth; }
  body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--text); min-height: 100vh; }
  h1,h2,h3,h4 { font-family: 'Playfair Display', serif; }
  button { cursor: pointer; font-family: 'DM Sans', sans-serif; }
  input, textarea, select { font-family: 'DM Sans', sans-serif; }
  a { color: inherit; text-decoration: none; }
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 10px 22px; border-radius: 8px; font-size: 14px; font-weight: 500;
    border: none; transition: all 0.2s; white-space: nowrap;
  }
  .btn-gold { background: var(--gold); color: #fff; }
  .btn-gold:hover { background: #b8913a; }
  .btn-outline { background: transparent; border: 1.5px solid var(--gold); color: var(--gold); }
  .btn-outline:hover { background: var(--gold-pale); }
  .btn-dark { background: var(--dark); color: #fff; }
  .btn-dark:hover { background: var(--mid); }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-danger:hover { background: #a93226; }
  .btn-sm { padding: 6px 14px; font-size: 13px; }
  .btn-lg { padding: 14px 32px; font-size: 16px; }
  .card {
    background: var(--warm-white); border-radius: var(--radius);
    border: 1px solid var(--border); padding: 24px; box-shadow: var(--shadow);
  }
  .input-group { display: flex; flex-direction: column; gap: 6px; }
  .input-group label { font-size: 13px; font-weight: 500; color: var(--muted); }
  .input-group input, .input-group textarea, .input-group select {
    padding: 10px 14px; border: 1.5px solid #e8dcc8; border-radius: 8px;
    font-size: 14px; background: var(--warm-white); color: var(--text);
    transition: border-color 0.2s;
  }
  .input-group input:focus, .input-group textarea:focus, .input-group select:focus {
    outline: none; border-color: var(--gold);
  }
  .badge {
    display: inline-flex; align-items: center; padding: 3px 10px;
    border-radius: 20px; font-size: 12px; font-weight: 500;
  }
  .badge-gold { background: var(--gold-pale); color: #8B6914; }
  .badge-green { background: #E9F7EF; color: #1E8449; }
  .badge-red { background: #FDEDEC; color: #C0392B; }
  .badge-blue { background: #EBF5FB; color: #1A5276; }
  .badge-gray { background: #F2F3F4; color: #566573; }
  .toast {
    position: fixed; bottom: 24px; right: 24px; z-index: 9999;
    background: var(--dark); color: #fff; padding: 12px 20px;
    border-radius: 10px; font-size: 14px; box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    animation: slideUp 0.3s ease;
  }
  @keyframes slideUp { from { transform: translateY(20px); opacity:0; } to { transform: translateY(0); opacity:1; } }
  .nav {
    position: sticky; top: 0; z-index: 100;
    background: rgba(250,247,242,0.95); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 32px; height: 64px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .nav-logo { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 900; color: var(--dark); }
  .nav-logo span { color: var(--gold); }
  .nav-links { display: flex; align-items: center; gap: 12px; }
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.5);
    display: flex; align-items: center; justify-content: center;
    z-index: 1000; padding: 20px;
  }
  .modal {
    background: var(--warm-white); border-radius: 16px;
    padding: 32px; width: 100%; max-width: 480px;
    max-height: 90vh; overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  }
  .modal-title { font-size: 22px; margin-bottom: 20px; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
  .divider { border: none; border-top: 1px solid var(--border); margin: 20px 0; }
  .star { color: var(--gold); }
  .tag { display: inline-block; background: var(--gold-pale); color: #8B6914; padding: 4px 12px; border-radius: 20px; font-size: 12px; margin: 2px; }
  @media (max-width: 600px) {
    .grid-2, .grid-3 { grid-template-columns: 1fr; }
    .nav { padding: 0 16px; }
  }
</style>
</head>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;
const BANNER_IMG = window.BANNER_IMG;

// ─── DATA HELPERS ────────────────────────────────────────────────────────────
const store = {
  get: (k) => { try { return JSON.parse(localStorage.getItem(k)); } catch { return null; } },
  set: (k,v) => localStorage.setItem(k, JSON.stringify(v)),
};

// ── Security utilities ──────────────────────────────────────────────────────────
// ── Email API helper ─────────────────────────────────────────────────────────
const sendEmail = async (type, to, data) => {
  try {
    const res = await fetch('/api/send-email', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ type, to, data }),
    });
    const json = await res.json();
    if (!res.ok) throw new Error(json.error || 'Email failed');
    return true;
  } catch (err) {
    console.error('[Quoted] Email error:', err.message);
    return false;
  }
};

const sec = {
  // Simple XSS prevention - escape HTML entities in displayed strings
  esc: (str) => String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#x27;'),
  // Check if a string looks like a URL injection attempt
  isSafeUrl: (url) => {
    if (!url) return true;
    const s = String(url).trim().toLowerCase();
    return s.startsWith('http://') || s.startsWith('https://') || s.startsWith('/') || s.startsWith('data:image/');
  },
  // Sanitize input to prevent localStorage injection
  sanitize: (str, maxLen=500) => String(str || '').trim().slice(0, maxLen),
};

// ── Session integrity check ────────────────────────────────────────────────────
const verifySession = () => {
  const session = store.get('quoted_session');
  if (!session) return null;
  // Validate session has required fields
  if (!session.id || !session.role || !session.email) {
    store.set('quoted_session', null); return null;
  }
  if (session.role === 'photographer') {
    const users = store.get('users') || [];
    const user = users.find(u => u.id === session.id && u.email === session.email);
    if (!user || user.suspended) { store.set('quoted_session', null); return null; }
    return user;
  }
  if (session.role === 'admin') return session;
  return null;
};

const initData = () => {
  if (!store.get('snaplLeads_init')) {
    store.set('users', []);
    store.set('leads', []);
    store.set('reviews', []);
    store.set('complaints', []);
    store.set('site_settings', {

// ─── TOAST ───────────────────────────────────────────────────────────────────
let toastFn = null;
function Toast() {
  const [msg, setMsg] = useState(null);
  toastFn = (m, dur=3000) => { setMsg(m); setTimeout(() => setMsg(null), dur); };
  if (!msg) return null;
  return <div className="toast">{msg}</div>;
}
const toast = (m, d) => toastFn && toastFn(m, d);

// ─── STARS ───────────────────────────────────────────────────────────────────
function Stars({ rating, size=14 }) {
  return <span style={{fontSize: size}}>{[1,2,3,4,5].map(i => (
    <span key={i} style={{color: i <= Math.round(rating) ? '#C9A84C' : '#ddd'}}>★</span>
  ))}</span>;
}

function HomePage({ setPage, setCurrentLead }) {
  const [step, setStep] = useState('landing');
  const [formNum, setFormNum] = useState('');
  const [lookupNum, setLookupNum] = useState('');
  const [form, setForm] = useState({
    name:'', email:'', phone:'', address:'', city:'', state:'', zip:'',
    eventType:'', eventDate:'', eventLocation:'', guestCount:'',
    budget:'', notes:'', formNum: ''
  });

  const handleLookup = () => {
    const leads = store.get('leads') || [];
    const found = leads.find(l => l.formNum === lookupNum.trim().toUpperCase());
    if (found) {
      setForm({...found});
      setFormNum(found.formNum);
      setStep('form');
      toast('✓ Form loaded — update and resubmit');
    } else {
      toast('Form number not found');
    }
  };

  const handleSubmit = (e) => {
    e.preventDefault();
    const leads = store.get('leads') || [];
    const num = form.formNum || genFormNum();
    const existing = leads.findIndex(l => l.formNum === num);
    const now = Date.now();
    const leadData = {
      ...form, formNum: num,
      id: existing >= 0 ? leads[existing].id : genLeadId(),
      createdAt: existing >= 0 ? leads[existing].createdAt : now,
      updatedAt: now,
      status: 'active',
      contactedBy: existing >= 0 ? [] : [],
      holdAt: null,
      deletedAt: null,
      cost: (() => {
        const et = (form.eventType || '').toLowerCase();
        if (et.includes('wedding')) return 12;
        if (et.includes('corporate')) return 15;
        return 8; // general events
      })(),
    };
    if (existing >= 0) {
      leadData.contactedBy = [];
      leadData.status = 'active';
      leads[existing] = leadData;
    } else {
      leads.push(leadData);
    }
    store.set('leads', leads);
    setFormNum(num);
    setCurrentLead(leadData);
    setStep('confirm');
    // Send form-code email to client

// ─── PHOTOGRAPHER LIST PAGE ───────────────────────────────────────────────────
function PhotographersPage({ setPage, setViewingPro }) {
  const users = (store.get('users') || []).filter(u => u.role === 'photographer' && !u.suspended);
  const reviews = store.get('reviews') || [];

  const getAvgRating = (uid) => {
    const r = reviews.filter(rv => rv.photographerId === uid);
    if (!r.length) return 0;
    return r.reduce((a,b) => a + b.rating, 0) / r.length;
  };

  const proData = users.map(u => ({
    ...u,
    avgRating: getAvgRating(u.id),
    reviewCount: reviews.filter(rv => rv.photographerId === u.id).length,
  })).sort((a,b) => {
    if (b.featured && !a.featured) return 1;
    if (a.featured && !b.featured) return -1;
    return b.avgRating - a.avgRating;
  });

  const top5 = proData.slice(0,5);
  const rest = proData.slice(5);

  const ProCard = ({ pro, isTop }) => (
    <div className="card" style={{display:'flex',gap:16,alignItems:'flex-start',cursor:'pointer',transition:'box-shadow 0.2s',position:'relative'}}
      onClick={()=>{ setViewingPro(pro); setPage('pro-profile'); }}
      onMouseEnter={e=>e.currentTarget.style.boxShadow='0 8px 32px rgba(0,0,0,0.12)'}
      onMouseLeave={e=>e.currentTarget.style.boxShadow='var(--shadow)'}>
      {isTop && <div style={{position:'absolute',top:-8,right:12,background:'var(--gold)',color:'#fff',fontSize:11,padding:'3px 10px',borderRadius:20,fontWeight:600}}>⭐ Top Rated</div>}
      <div style={{width:64,height:64,borderRadius:'50%',background:'var(--gold-pale)',overflow:'hidden',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',fontSize:22,fontWeight:700,color:'var(--gold)',border:'2px solid var(--border)'}}>
        {pro.profilePic ? <img src={pro.profilePic} style={{width:'100%',height:'100%',objectFit:'cover'}}/> : (pro.photos||[])[0] ? <img src={(pro.photos||[])[0]} style={{width:'100%',height:'100%',objectFit:'cover'}}/> : (pro.studioName||pro.name||'?')[0].toUpperCase()}
      </div>
      <div style={{flex:1,minWidth:0}}>
        <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
          <h3 style={{fontSize:'1rem',marginBottom:0}}>{pro.studioName || pro.name}</h3>
          {isTop && <span style={{color:'var(--gold)'}}>⭐</span>}
        </div>
        <div style={{display:'flex',alignItems:'center',gap:6,margin:'4px 0'}}>
          <Stars rating={pro.avgRating} />
          <span style={{fontSize:12,color:'var(--muted)'}}>({pro.reviewCount} reviews)</span>
        </div>
        <p style={{fontSize:13,color:'var(--muted)',overflow:'hidden',display:'-webkit-box',WebkitLineClamp:2,WebkitBoxOrient:'vertical'}}>
          {pro.aboutMe || 'Professional photographer ready to capture your special moments.'}
        </p>
        <div style={{marginTop:8,display:'flex',gap:4,flexWrap:'wrap'}}>
          {(pro.specialties||[]).slice(0,3).map(s=><span key={s} className="tag">{s}</span>)}
        </div>
      </div>
      <button className="btn btn-outline btn-sm" style={{flexShrink:0}}>View Profile</button>
    </div>
  );

  return (
    <div style={{maxWidth:800,margin:'0 auto',padding:'40px 20px'}}>
      <h2 style={{marginBottom:4}}>Available Photographers</h2>
      <p style={{color:'var(--muted)',marginBottom:32}}>Browse profiles and portfolios of photographers in your area.</p>
      {proData.length === 0 && <div className="card" style={{textAlign:'center',padding:'48px'}}>
        <p style={{color:'var(--muted)'}}>No photographers listed yet. Check back soon!</p>
      </div>}
      {top5.length > 0 && <>
        <h3 style={{fontSize:'0.85rem',letterSpacing:1,color:'var(--muted)',marginBottom:16,textTransform:'uppercase'}}>⭐ Top Rated</h3>
        <div style={{display:'flex',flexDirection:'column',gap:12,marginBottom:32}}>
          {top5.map(p=><ProCard key={p.id} pro={p} isTop/>)}

      </>}
      {rest.length > 0 && <>
        <h3 style={{fontSize:'0.85rem',letterSpacing:1,color:'var(--muted)',marginBottom:16,textTransform:'uppercase'}}>All Photographers</h3>
        <div style={{display:'flex',flexDirection:'column',gap:12}}>
          {rest.map(p=><ProCard key={p.id} pro={p} isTop={false}/>)}
        </div>
      </>}
    </div>
  );

// ─── PRO AUTH (Login/Signup) ─────────────────────────────────────────────────
function ResetPasswordPage({ token, setPage }) {
  const [form, setForm] = useState({ password: '', confirm: '' });
  const [showPw, setShowPw] = useState(false);
  const [pwStrength, setPwStrength] = useState(0);
  const [done, setDone] = useState(false);

  const strengthColor = ['','#e74c3c','#e67e22','#f1c40f','#2ecc71','#27ae60'];
  const strengthLabel = ['','Weak','Fair','Good','Strong','Very Strong'];
  const checkStrength = (pw) => {
    let s=0;
    if(pw.length>=8)s++;if(pw.length>=12)s++;
    if(/[A-Z]/.test(pw))s++;if(/[0-9]/.test(pw))s++;if(/[^A-Za-z0-9]/.test(pw))s++;
    setPwStrength(s); return s;
  };

  const handleReset = (e) => {
    e.preventDefault();
    if (form.password !== form.confirm) { toast('Passwords do not match'); return; }
    if (checkStrength(form.password) < 2) { toast('Password is too weak — use at least 8 characters with numbers or uppercase letters'); return; }

    const resets = store.get('pw_resets') || [];
    const entryIdx = resets.findIndex(r => r.token === token && !r.used);
    if (entryIdx < 0) { toast('This reset link is invalid or expired. Please request a new one.'); setPage('pro-login'); return; }

    const entry = resets[entryIdx];
    if (Date.now() - entry.createdAt > 60 * 60 * 1000) {
      toast('This reset link has expired. Please request a new one.');
      setPage('pro-login'); return;
    }

    // Update the user's password
    const users = store.get('users') || [];
    const userIdx = users.findIndex(u => u.email.toLowerCase() === entry.email.toLowerCase());
    if (userIdx < 0) { toast('Account not found'); setPage('pro-login'); return; }

    users[userIdx].password = form.password;
    store.set('users', users);

    // Mark token as used
    resets[entryIdx].used = true;
    store.set('pw_resets', resets);

    // Clear any remembered session
    store.set('quoted_session', null);

    setDone(true);
  };

  const inputBase = {width:'100%',padding:'10px 44px 10px 14px',border:'1.5px solid #e8dcc8',borderRadius:8,fontSize:14,background:'var(--warm-white)',color:'var(--text)'};

  return (
    <div style={{maxWidth:420,margin:'60px auto',padding:'0 20px'}}>
      <div className="card">
        {done ? (
          <div style={{textAlign:'center',padding:'8px 0'}}>
            <div style={{fontSize:48,marginBottom:12}}>✅</div>
            <h2 style={{marginBottom:8}}>Password Updated!</h2>
            <p style={{color:'var(--muted)',fontSize:14,marginBottom:24}}>Your password has been changed successfully. You can now log in with your new password.</p>
            <button className="btn btn-gold" style={{width:'100%',justifyContent:'center'}} onClick={()=>setPage('pro-login')}>
              Go to Login →
            </button>
          </div>
        ) : (
          <>
            <div style={{textAlign:'center',marginBottom:24}}>
              <div style={{fontSize:36,marginBottom:8}}>🔐</div>
              <h2 style={{marginBottom:4}}>Set New Password</h2>
              <p style={{color:'var(--muted)',fontSize:13}}>Choose a strong password for your account.</p>
            </div>
            <form onSubmit={handleReset}>
              <div className="input-group" style={{marginBottom: pwStrength > 0 ? 8 : 14}}>
                <label>New Password *</label>
                <div style={{position:'relative'}}>
                  <input required type={showPw?'text':'password'} value={form.password}
                    onChange={e=>{setForm({...form,password:e.target.value});checkStrength(e.target.value);}}
                    placeholder="••••••••" maxLength={128} autoComplete="new-password"
                    style={inputBase}/>
                  <button type="button" onClick={()=>setShowPw(!showPw)}
                    style={{position:'absolute',right:10,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',cursor:'pointer',color:'var(--muted)',fontSize:18}}>
                    {showPw ? '🙈' : '👁️'}
                  </button>
                </div>
              </div>
              {form.password && <div style={{marginBottom:14}}>
                <div style={{display:'flex',gap:3,marginBottom:4}}>
                  {[1,2,3,4,5].map(i=><div key={i} style={{flex:1,height:3,borderRadius:2,background:i<=pwStrength?strengthColor[pwStrength]:'#e8dcc8',transition:'background 0.3s'}}/>)}
                </div>
                <span style={{fontSize:11,color:strengthColor[pwStrength]||'var(--muted)'}}>{strengthLabel[pwStrength]||''}</span>
              </div>}
              <div className="input-group" style={{marginBottom:24}}>
                <label>Confirm Password *</label>
                <div style={{position:'relative'}}>
                  <input required type={showPw?'text':'password'} value={form.confirm}
                    onChange={e=>setForm({...form,confirm:e.target.value})}
                    placeholder="••••••••" maxLength={128} autoComplete="new-password"
                    style={{...inputBase, borderColor: form.confirm && form.confirm!==form.password ? 'var(--danger)' : ''}}/>
                </div>
                {form.confirm && form.confirm !== form.password && (
                  <span style={{fontSize:11,color:'var(--danger)'}}>Passwords don't match</span>
                )}
              </div>
              <button type="submit" className="btn btn-gold" style={{width:'100%',justifyContent:'center'}}>
                Set New Password →
              </button>
            </form>
            <p style={{textAlign:'center',marginTop:12,fontSize:12,color:'var(--muted)'}}>
              <span style={{color:'var(--gold)',cursor:'pointer'}} onClick={()=>setPage('pro-login')}>← Back to login</span>
            </p>
          </>
        )}
      </div>
    </div>
  );
}

function ProAuthPage({ setPage, setCurrentUser }) {
  const [mode, setMode] = useState('login');       // login | signup | forgot
  const [form, setForm] = useState({ name:'', email:'', password:'', confirmPassword:'', studioName:'' });
  const [showPw, setShowPw] = useState(false);
  const [showConfirmPw, setShowConfirmPw] = useState(false);
  const [rememberMe, setRememberMe] = useState(false);
  const [loading, setLoading] = useState(false);
  const [forgotSent, setForgotSent] = useState(false);
  const [pwStrength, setPwStrength] = useState(0);

  // Load remembered email on mount
  React.useEffect(() => {
    const saved = localStorage.getItem('quoted_remember_email');
    if (saved) { setForm(f=>({...f, email: saved})); setRememberMe(true); }
  }, []);

  // ── Security: rate limiting ──────────────────────────────────────────────────
  const checkRateLimit = (key, max, windowMs) => {
    const now = Date.now();
    const attempts = JSON.parse(localStorage.getItem(key) || '[]').filter(t => now - t < windowMs);
    if (attempts.length >= max) return false;
    attempts.push(now);
    localStorage.setItem(key, JSON.stringify(attempts));
    return true;
  };

  // ── Security: sanitize input ─────────────────────────────────────────────────
  const sanitize = (str) => String(str).trim().slice(0, 500).replace(/[<>]/g, '');

  // ── Password strength checker ────────────────────────────────────────────────
  const checkStrength = (pw) => {
    let score = 0;
    if (pw.length >= 8) score++;
    if (pw.length >= 12) score++;
    if (/[A-Z]/.test(pw)) score++;
    if (/[0-9]/.test(pw)) score++;
    if (/[^A-Za-z0-9]/.test(pw)) score++;
    setPwStrength(score);
    return score;
  };

  const strengthLabel = ['', 'Weak', 'Fair', 'Good', 'Strong', 'Very Strong'];
  const strengthColor = ['', '#e74c3c', '#e67e22', '#f1c40f', '#2ecc71', '#27ae60'];

  const handleLogin = (e) => {
    e.preventDefault();
    // Rate limit: max 5 login attempts per 15 minutes
    if (!checkRateLimit('login_attempts', 5, 15 * 60 * 1000)) {
      toast('Too many login attempts. Please wait 15 minutes.'); return;
    }
    const email = sanitize(form.email).toLowerCase();
    const password = form.password;
    if (!email || !password) { toast('Please fill in all fields'); return; }
    setLoading(true);
    setTimeout(async () => { // Slight delay to prevent timing attacks
      if (rememberMe) { localStorage.setItem('quoted_remember_email', email); }
      else { localStorage.removeItem('quoted_remember_email'); }
      // Admin check — obfuscated, no hint on page
      const adminCreds = store.get('admin_creds') || { email: 'admin@quoted.com', hash: 'admin123' };
      if (email === adminCreds.email.toLowerCase() && password === adminCreds.hash) {
        const adminUser = { id:'admin', role:'admin', name:'Admin', email };
        if (rememberMe) store.set('quoted_session', adminUser);
        setCurrentUser(adminUser);
        setPage('admin');
        setLoading(false);
        return;
      }
      const users = store.get('users') || [];
      const user = users.find(u => u.email.toLowerCase() === email && u.password === password);
      if (!user) { toast('Invalid email or password'); setLoading(false); return; }
      if (user.suspended) { toast('This account has been suspended. Contact support.'); setLoading(false); return; }
      if (rememberMe) store.set('quoted_session', user);
      // Clear failed attempts on success
      localStorage.removeItem('login_attempts');
      setCurrentUser(user);
      setPage('pro-dashboard');
      setLoading(false);
    }, 400);
  };

  const handleSignup = (e) => {
    e.preventDefault();
    // Rate limit: max 3 signups per hour per browser
    if (!checkRateLimit('signup_attempts', 3, 60 * 60 * 1000)) {
      toast('Too many signup attempts. Please try again later.'); return;
    }
    const name = sanitize(form.name);
    const email = sanitize(form.email).toLowerCase();
    const studioName = sanitize(form.studioName);
    const password = form.password;
    if (!name || !email || !password) { toast('Please fill in all required fields'); return; }
    if (password !== form.confirmPassword) { toast('Passwords do not match'); return; }
    if (checkStrength(password) < 2) { toast('Password is too weak. Use at least 8 characters with mixed case or numbers.'); return; }
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { toast('Please enter a valid email address'); return; }
    const users = store.get('users') || [];
    if (users.find(u => u.email.toLowerCase() === email)) { toast('An account with this email already exists'); return; }
    setLoading(true);
    setTimeout(async () => {
      const user = {
        id: genId(), role: 'photographer',
        name, email, password,
        studioName, points: 0,
        aboutMe: '', photos: [], videos: [{url:'',thumbnail:'',label:''},{url:'',thumbnail:'',label:''},{url:'',thumbnail:'',label:''}],
        profilePic: '', bannerImg: '', specialties: [],
        suspended: false, featured: false,
        createdAt: Date.now(),
      };
      users.push(user);
      store.set('users', users);
      setCurrentUser(user);
      setPage('pro-dashboard');
      toast('Welcome to Quoted! 🎉');
      setLoading(false);
    }, 300);
  };

  const handleForgotPassword = async (e) => {
    e.preventDefault();
    if (!checkRateLimit('forgot_attempts', 3, 60 * 60 * 1000)) {
      toast('Too many attempts. Please try again later.'); return;
    }
    const email = sanitize(form.email).toLowerCase();
    if (!email) { toast('Please enter your email address'); return; }
    setLoading(true);
    setTimeout(async () => {
      const users = store.get('users') || [];
      const user = users.find(u => u.email.toLowerCase() === email);
      if (user) {
        const resetToken = genId() + genId();
        const resets = store.get('pw_resets') || [];
        resets.push({ email: user.email, token: resetToken, createdAt: Date.now(), used: false });
        store.set('pw_resets', resets);
        const resetUrl = `${window.location.origin}${window.location.pathname}?reset=${resetToken}`;
        await sendEmail('password-reset', user.email, {
          name: user.name || 'there',
          resetToken,
          resetUrl,
        });
      }
      toast('If this email is registered, a reset link has been sent.');
      setForgotSent(true);
      setLoading(false);
    }, 500);
  };

  const inputBase = {width:'100%',padding:'10px 14px',border:'1.5px solid #e8dcc8',borderRadius:8,fontSize:14,background:'var(--warm-white)',color:'var(--text)',transition:'border-color 0.2s'};

  if (mode === 'forgot') return (
    <div style={{maxWidth:420,margin:'60px auto',padding:'0 20px'}}>
      <div className="card">
        <div style={{textAlign:'center',marginBottom:24}}>
          <div style={{fontSize:36,marginBottom:8}}>🔑</div>
          <h2 style={{marginBottom:6}}>Reset Password</h2>
          <p style={{color:'var(--muted)',fontSize:13}}>Enter your email and we'll send you a reset link.</p>
        </div>
        {forgotSent ? (
          <div style={{textAlign:'center'}}>
            <div style={{background:'#e9f7ef',borderRadius:10,padding:'20px',marginBottom:20}}>
              <div style={{fontSize:28,marginBottom:8}}>✉️</div>
              <p style={{fontSize:14,color:'#1e8449',fontWeight:500}}>Reset link sent!</p>
              <p style={{fontSize:12,color:'var(--muted)',marginTop:6}}>Check your email (and spam folder). The link expires in 1 hour.</p>
            </div>
            <button className="btn btn-outline" style={{width:'100%',justifyContent:'center'}} onClick={()=>{setMode('login');setForgotSent(false);setForm({...form,email:''});}}>Back to Login</button>
          </div>
        ) : (
          <form onSubmit={handleForgotPassword}>
            <div className="input-group" style={{marginBottom:20}}>
              <label>Email Address *</label>
              <input required type="email" value={form.email} onChange={e=>setForm({...form,email:e.target.value})} placeholder="you@email.com" style={inputBase}/>
            </div>
            <button type="submit" className="btn btn-gold" style={{width:'100%',justifyContent:'center',marginBottom:12}} disabled={loading}>
              {loading ? 'Sending…' : 'Send Reset Link →'}
            </button>
            <button type="button" className="btn btn-outline" style={{width:'100%',justifyContent:'center'}} onClick={()=>setMode('login')}>Back to Login</button>
          </form>
        )}
      </div>
    </div>
  );

  return (
    <div style={{maxWidth:440,margin:'60px auto',padding:'0 20px'}}>
      <div className="card">
        <div style={{textAlign:'center',marginBottom:24}}>
          <h2 style={{marginBottom:4}}>{mode==='login'?'Welcome back':'Create your account'}</h2>
          <p style={{color:'var(--muted)',fontSize:13}}>{mode==='login'?'Log in to access your leads and profile':'Join as a photographer on Quoted'}</p>
        </div>

        <form onSubmit={mode==='login'?handleLogin:handleSignup}>
          {mode==='signup' && <>
            <div className="input-group" style={{marginBottom:14}}>
              <label>Full Name *</label>
              <input required value={form.name} onChange={e=>setForm({...form,name:e.target.value})} placeholder="Jane Smith" maxLength={100} style={inputBase}/>
            </div>
            <div className="input-group" style={{marginBottom:14}}>
              <label>Studio / Business Name</label>
              <input value={form.studioName} onChange={e=>setForm({...form,studioName:e.target.value})} placeholder="Smith Photography Co." maxLength={150} style={inputBase}/>
            </div>
          </>}
          <div className="input-group" style={{marginBottom:14}}>
            <label>Email *</label>
            <input required type="email" value={form.email} onChange={e=>setForm({...form,email:e.target.value})} placeholder="you@email.com" maxLength={200} autoComplete="email" style={inputBase}/>
          </div>
          <div className="input-group" style={{marginBottom:mode==='signup'?10:14}}>
            <label>Password *</label>
            <div style={{position:'relative'}}>
              <input required type={showPw?'text':'password'} value={form.password}
                onChange={e=>{setForm({...form,password:e.target.value});if(mode==='signup')checkStrength(e.target.value);}}
                placeholder="••••••••" maxLength={128} autoComplete={mode==='login'?'current-password':'new-password'}
                style={{...inputBase,padding:'10px 44px 10px 14px'}}/>
              <button type="button" onClick={()=>setShowPw(!showPw)} style={{position:'absolute',right:10,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',cursor:'pointer',color:'var(--muted)',fontSize:18,lineHeight:1,padding:2}}>
                {showPw ? '🙈' : '👁️'}
              </button>
            </div>
            {mode==='signup' && form.password && (
              <div style={{marginTop:6}}>
                <div style={{display:'flex',gap:3,marginBottom:4}}>
                  {[1,2,3,4,5].map(i=><div key={i} style={{flex:1,height:3,borderRadius:2,background:i<=pwStrength?strengthColor[pwStrength]:'#e8dcc8',transition:'background 0.3s'}}/>)}
                </div>
                <span style={{fontSize:11,color:strengthColor[pwStrength]||'var(--muted)'}}>{strengthLabel[pwStrength]||''}</span>
              </div>
            )}
          </div>
          {mode==='signup' && <div className="input-group" style={{marginBottom:14}}>
            <label>Confirm Password *</label>
            <div style={{position:'relative'}}>
              <input required type={showConfirmPw?'text':'password'} value={form.confirmPassword}
                onChange={e=>setForm({...form,confirmPassword:e.target.value})}
                placeholder="••••••••" maxLength={128} autoComplete="new-password"
                style={{...inputBase,padding:'10px 44px 10px 14px',borderColor:form.confirmPassword&&form.confirmPassword!==form.password?'var(--danger)':''}}/>
              <button type="button" onClick={()=>setShowConfirmPw(!showConfirmPw)} style={{position:'absolute',right:10,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',cursor:'pointer',color:'var(--muted)',fontSize:18,lineHeight:1,padding:2}}>
                {showConfirmPw ? '🙈' : '👁️'}
              </button>
            </div>
            {form.confirmPassword && form.confirmPassword !== form.password && <span style={{fontSize:11,color:'var(--danger)'}}>Passwords don't match</span>}
          </div>}
          {mode==='login' && <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
            <label style={{display:'flex',alignItems:'center',gap:8,cursor:'pointer',fontSize:13,color:'var(--muted)'}}>
              <input type="checkbox" checked={rememberMe} onChange={e=>setRememberMe(e.target.checked)} style={{accentColor:'var(--gold)',width:15,height:15}}/>
              Remember me
            </label>
            <span style={{fontSize:13,color:'var(--gold)',cursor:'pointer',fontWeight:500}} onClick={()=>{setMode('forgot');setForgotSent(false);}}>Forgot password?</span>
          </div>}
          {mode==='signup' && <div style={{marginBottom:20}}/>}
          <button type="submit" className="btn btn-gold" style={{width:'100%',justifyContent:'center',opacity:loading?0.7:1}} disabled={loading}>
            {loading ? '…' : mode==='login' ? 'Login →' : 'Create Account →'}
          </button>
        </form>

        <p style={{textAlign:'center',marginTop:16,fontSize:13,color:'var(--muted)'}}>
          {mode==='login'
            ? <>No account? <span style={{color:'var(--gold)',cursor:'pointer',fontWeight:500}} onClick={()=>{setMode('signup');setPwStrength(0);}}>Sign up free</span></>
            : <>Have an account? <span style={{color:'var(--gold)',cursor:'pointer',fontWeight:500}} onClick={()=>setMode('login')}>Log in</span></>}
        </p>
      </div>
    </div>
  );
}

function AccountSettingsTab({ currentUser, setCurrentUser, setPage }) {
  const [pwForm, setPwForm] = useState({ current:'', newPw:'', confirm:'' });
  const [showPws, setShowPws] = useState({ current:false, newPw:false, confirm:false });
  const [deleteConfirm, setDeleteConfirm] = useState('');
  const [deleteStep, setDeleteStep] = useState(0); // 0=idle 1=confirm 2=type
  const [pwStrength, setPwStrength] = useState(0);

  const strengthColor = ['','#e74c3c','#e67e22','#f1c40f','#2ecc71','#27ae60'];
  const strengthLabel = ['','Weak','Fair','Good','Strong','Very Strong'];
  const checkStrength = (pw) => {
    let s=0;
    if(pw.length>=8)s++;if(pw.length>=12)s++;
    if(/[A-Z]/.test(pw))s++;if(/[0-9]/.test(pw))s++;if(/[^A-Za-z0-9]/.test(pw))s++;
    setPwStrength(s); return s;
  };

  const changePassword = (e) => {
    e.preventDefault();
    const users = store.get('users') || [];
    const idx = users.findIndex(u => u.id === currentUser.id);
    if (idx < 0) { toast('Account not found'); return; }
    if (users[idx].password !== pwForm.current) { toast('Current password is incorrect'); return; }
    if (pwForm.newPw !== pwForm.confirm) { toast('New passwords do not match'); return; }
    if (checkStrength(pwForm.newPw) < 2) { toast('New password is too weak'); return; }
    if (pwForm.newPw === pwForm.current) { toast('New password must be different from your current one'); return; }
    users[idx].password = pwForm.newPw;
    store.set('users', users);
    setCurrentUser({...currentUser, password: pwForm.newPw});
    setPwForm({current:'',newPw:'',confirm:''});
    setPwStrength(0);
    toast('✓ Password changed successfully');
  };

  const deleteAccount = () => {
    if (deleteConfirm.trim().toUpperCase() !== 'DELETE') { toast('Type DELETE to confirm'); return; }
    const users = store.get('users') || [];
    const updated = users.filter(u => u.id !== currentUser.id);
    store.set('users', updated);
    // Also remove their leads, reviews, etc.
    const leads = store.get('leads') || [];
    leads.forEach(l => { if(l.contactedBy) l.contactedBy = l.contactedBy.filter(id=>id!==currentUser.id); });
    store.set('leads', leads);
    localStorage.removeItem('quoted_session');
    localStorage.removeItem('quoted_remember_email');
    setCurrentUser(null);
    setPage('home');
    toast('Account deleted. Sorry to see you go.');
  };

  const inputBase = {width:'100%',padding:'10px 44px 10px 14px',border:'1.5px solid #e8dcc8',borderRadius:8,fontSize:14,background:'var(--warm-white)',color:'var(--text)'};
  const Eye = ({k}) => <button type="button" onClick={()=>setShowPws({...showPws,[k]:!showPws[k]})} style={{position:'absolute',right:10,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',cursor:'pointer',color:'var(--muted)',fontSize:18,lineHeight:1}}>{showPws[k]?'🙈':'👁️'}</button>;

  return (
    <div>
      {/* Change Password */}
      <div className="card" style={{marginBottom:16}}>
        <h3 style={{marginBottom:6}}>Change Password</h3>
        <p style={{color:'var(--muted)',fontSize:13,marginBottom:20}}>Use a strong password with at least 8 characters including numbers and uppercase letters.</p>
        <form onSubmit={changePassword}>
          <div className="input-group" style={{marginBottom:14}}>
            <label>Current Password *</label>
            <div style={{position:'relative'}}>
              <input required type={showPws.current?'text':'password'} value={pwForm.current} onChange={e=>setPwForm({...pwForm,current:e.target.value})} placeholder="••••••••" maxLength={128} style={inputBase}/>
              <Eye k="current"/>
            </div>
          </div>
          <div className="input-group" style={{marginBottom:pwStrength>0?8:14}}>
            <label>New Password *</label>
            <div style={{position:'relative'}}>
              <input required type={showPws.newPw?'text':'password'} value={pwForm.newPw} onChange={e=>{setPwForm({...pwForm,newPw:e.target.value});checkStrength(e.target.value);}} placeholder="••••••••" maxLength={128} style={inputBase}/>
              <Eye k="newPw"/>
            </div>
          </div>
          {pwForm.newPw && <div style={{marginBottom:14}}>
            <div style={{display:'flex',gap:3,marginBottom:4}}>
              {[1,2,3,4,5].map(i=><div key={i} style={{flex:1,height:3,borderRadius:2,background:i<=pwStrength?strengthColor[pwStrength]:'#e8dcc8',transition:'background 0.3s'}}/>)}
            </div>
            <span style={{fontSize:11,color:strengthColor[pwStrength]}}>{strengthLabel[pwStrength]}</span>
          </div>}
          <div className="input-group" style={{marginBottom:20}}>
            <label>Confirm New Password *</label>
            <div style={{position:'relative'}}>
              <input required type={showPws.confirm?'text':'password'} value={pwForm.confirm} onChange={e=>setPwForm({...pwForm,confirm:e.target.value})} placeholder="••••••••" maxLength={128} style={{...inputBase,borderColor:pwForm.confirm&&pwForm.confirm!==pwForm.newPw?'var(--danger)':''}}/>
              <Eye k="confirm"/>
            </div>
            {pwForm.confirm && pwForm.confirm !== pwForm.newPw && <span style={{fontSize:11,color:'var(--danger)'}}>Passwords don't match</span>}
          </div>
          <button type="submit" className="btn btn-gold">Update Password</button>
        </form>
      </div>

      {/* Delete Account */}
      <div className="card" style={{border:'1.5px solid rgba(192,57,43,0.25)'}}>
        <h3 style={{marginBottom:6,color:'var(--danger)'}}>Delete Account</h3>
        <p style={{color:'var(--muted)',fontSize:13,marginBottom:16}}>Permanently deletes your profile, photos, and all associated data. This action cannot be undone.</p>
        {deleteStep === 0 && <button className="btn btn-danger btn-sm" onClick={()=>setDeleteStep(1)}>Delete My Account</button>}
        {deleteStep === 1 && <div style={{background:'#fdedec',borderRadius:10,padding:16,marginBottom:0}}>
          <p style={{fontSize:14,fontWeight:500,marginBottom:12,color:'var(--danger)'}}>⚠️ Are you absolutely sure?</p>
          <p style={{fontSize:13,color:'var(--muted)',marginBottom:16}}>All your data — profile, photos, leads, reviews — will be permanently deleted.</p>
          <div style={{display:'flex',gap:8}}>
            <button className="btn btn-danger btn-sm" onClick={()=>setDeleteStep(2)}>Yes, I want to delete</button>
            <button className="btn btn-outline btn-sm" onClick={()=>setDeleteStep(0)}>Cancel</button>
          </div>
        </div>}
        {deleteStep === 2 && <div style={{background:'#fdedec',borderRadius:10,padding:16}}>
          <p style={{fontSize:13,fontWeight:500,marginBottom:10,color:'var(--danger)'}}>Type <strong>DELETE</strong> to confirm:</p>
          <div style={{display:'flex',gap:8}}>
            <input value={deleteConfirm} onChange={e=>setDeleteConfirm(e.target.value.toUpperCase())} placeholder="DELETE" maxLength={10} style={{flex:1,padding:'8px 12px',border:'1.5px solid rgba(192,57,43,0.4)',borderRadius:8,fontSize:14,background:'#fff',letterSpacing:2,fontWeight:600}}/>
            <button className="btn btn-danger btn-sm" onClick={deleteAccount}>Delete Forever</button>
            <button className="btn btn-outline btn-sm" onClick={()=>{setDeleteStep(0);setDeleteConfirm('');}}>Cancel</button>
          </div>
        </div>}
      </div>
    </div>
  );
}

function ReviewLinkTab({ currentUser }) {
  const [link, setLink] = useState('');
  const [copied, setCopied] = useState(false);
  const [sendForm, setSendForm] = useState({ email:'', phone:'', formNum:'' });
  const [sent, setSent] = useState(null);

  const generateLink = () => {
    const base = window.location.href.split('?')[0];
    const l = `${base}?review=${currentUser.id}`;
    setLink(l);
  };

  const copy = () => {
    navigator.clipboard.writeText(link).then(()=>{ setCopied(true); setTimeout(()=>setCopied(false),2000); });
  };

  const sendToClient = async (method) => {
    if (!sendForm.formNum.trim()) { toast('Enter the client\'s form number'); return; }
    if (method === 'email' && !sendForm.email.trim()) { toast('Enter client email'); return; }
    if (method === 'sms' && !sendForm.phone.trim()) { toast('Enter client phone'); return; }
    const reviewLink = link || (() => { const base = window.location.href.split('?')[0]; return `${base}?review=${currentUser.id}`; })();
    // Log to localStorage as "sent" records
    const sent_records = store.get('sent_review_requests') || [];
    sent_records.push({
      photographerId: currentUser.id,
      formNum: sendForm.formNum.toUpperCase(),
      method,
      to: method === 'email' ? sendForm.email : sendForm.phone,
      link: reviewLink,
      sentAt: Date.now(),
    });
    store.set('sent_review_requests', sent_records);
    setSent(method);
    // Send real email via API
    if (method === 'email' && sendForm.email) {
      const ok = await sendEmail('review-request', sendForm.email, {
        clientName: sendForm.clientName || 'there',
        photographerName: currentUser.name || 'Your photographer',
        studioName: currentUser.studioName || '',
        formCode: sendForm.formNum.toUpperCase(),
        reviewUrl: reviewLink,
      });
      toast(ok ? `✓ Review request sent to ${sendForm.email}` : `✓ Logged — email delivery pending`);
    } else {
      toast(`✓ Review request logged for ${method === 'email' ? sendForm.email : sendForm.phone}`);
    }
    setTimeout(()=>setSent(null), 3000);
  };

  const sentRecords = (store.get('sent_review_requests')||[]).filter(r=>r.photographerId===currentUser.id);

  return (
    <div>
      <div className="card" style={{marginBottom:16}}>
        <h3 style={{marginBottom:8}}>Generate Review Link</h3>
        <p style={{color:'var(--muted)',fontSize:13,marginBottom:16}}>Clients use this link along with their form code to leave a verified review on your profile.</p>
        <button className="btn btn-gold" onClick={generateLink}>Generate My Review Link</button>
        {link && <div style={{marginTop:16}}>
          <div style={{display:'flex',gap:8}}>
            <input readOnly value={link} style={{flex:1,padding:'8px 12px',border:'1.5px solid #e8dcc8',borderRadius:8,fontSize:12,background:'var(--cream)'}}/>
            <button className="btn btn-outline btn-sm" onClick={copy}>{copied?'Copied!':'Copy'}</button>
          </div>
        </div>}
      </div>

      <div className="card" style={{marginBottom:16}}>
        <h3 style={{marginBottom:8}}>Send Directly to Client</h3>
        <p style={{color:'var(--muted)',fontSize:13,marginBottom:16}}>Enter the client's form number and contact info to send them a review request via email or text.</p>
        <div className="grid-2" style={{marginBottom:12}}>
          <div className="input-group">
            <label>Client's Name</label>
            <input value={sendForm.clientName||''} onChange={e=>setSendForm({...sendForm,clientName:e.target.value})} placeholder="Jane Smith"/>
          </div>
          <div className="input-group">
            <label>Client's Form Number *</label>
            <input value={sendForm.formNum} onChange={e=>setSendForm({...sendForm,formNum:e.target.value.toUpperCase()})} placeholder="FRM-XXXXXX"/>
          </div>
        </div>
        <div className="grid-2" style={{marginBottom:12}}>
          <div className="input-group">
            <label>Client Email</label>
            <input type="email" value={sendForm.email} onChange={e=>setSendForm({...sendForm,email:e.target.value})} placeholder="client@email.com"/>
          </div>
          <div className="input-group">
            <label>Client Phone (SMS)</label>
            <input type="tel" value={sendForm.phone} onChange={e=>setSendForm({...sendForm,phone:e.target.value})} placeholder="(555) 000-0000"/>
          </div>
        </div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
          <button className="btn btn-gold btn-sm" onClick={()=>sendToClient('email')}>📧 Send via Email</button>
          <button className="btn btn-outline btn-sm" onClick={()=>sendToClient('sms')}>💬 Send via Text</button>
        </div>
        {sent && <div style={{marginTop:12,background:'#e9f7ef',borderRadius:8,padding:'10px 14px',fontSize:13,color:'#1e8449'}}>
          ✓ Review request sent via {sent === 'email' ? 'email' : 'SMS'}! Client will receive a link with their form code.
        </div>}
      </div>

      {sentRecords.length > 0 && <div className="card">
        <h3 style={{marginBottom:12}}>Sent Review Requests ({sentRecords.length})</h3>
        {sentRecords.slice().reverse().map((r,i)=>(
          <div key={i} style={{padding:'8px 0',borderBottom:'1px solid var(--border)',fontSize:13,display:'flex',justifyContent:'space-between',flexWrap:'wrap',gap:4}}>
            <div>
              <span className="badge badge-blue" style={{marginRight:8}}>{r.method === 'email' ? 'Email' : 'SMS'}</span>
              <strong>{r.formNum}</strong> → {r.to}
            </div>
            <span style={{fontSize:11,color:'var(--muted)'}}>{new Date(r.sentAt).toLocaleDateString()}</span>
          </div>
        ))}
      </div>}
    </div>
  );
}

// ─── REVIEW SUBMISSION PAGE ───────────────────────────────────────────────────
function ReviewPage({ photographerId, setPage }) {
  const users = store.get('users') || [];
  const pro = users.find(u => u.id === photographerId);
  const [form, setForm] = useState({ formNum:'', clientName:'', rating:5, comment:'' });
  const [done, setDone] = useState(false);

  const submit = (e) => {
    e.preventDefault();
    const leads = store.get('leads') || [];
    const lead = leads.find(l => l.formNum === form.formNum.trim().toUpperCase());
    if (!lead) { toast('Form number not found'); return; }
    const reviews = store.get('reviews') || [];
    const already = reviews.find(r => r.formNum === form.formNum && r.photographerId === photographerId);
    if (already) { toast('A review has already been submitted with this form number for this photographer.'); return; }
    reviews.push({
      id: genId(), photographerId, formNum: form.formNum.toUpperCase(),
      clientName: form.clientName, rating: form.rating, comment: form.comment,
      createdAt: Date.now(),
    });
    store.set('reviews', reviews);
    setDone(true);
  };

  if (!pro) return <div style={{padding:'60px',textAlign:'center'}}><p>Photographer not found.</p></div>;
  if (done) return (
    <div style={{maxWidth:440,margin:'60px auto',padding:'0 20px',textAlign:'center'}}>
      <div className="card">
        <div style={{fontSize:48,marginBottom:12}}>⭐</div>
        <h2>Thank you for your review!</h2>
        <p style={{color:'var(--muted)',marginTop:8,marginBottom:20}}>Your feedback helps other clients find great photographers.</p>
        <button className="btn btn-gold" onClick={()=>setPage('home')}>Return Home</button>
      </div>
    </div>
  );

  return (
    <div style={{maxWidth:480,margin:'40px auto',padding:'0 20px'}}>
      <div className="card">
        <h2 style={{marginBottom:4}}>Leave a Review</h2>
        <p style={{color:'var(--muted)',fontSize:13,marginBottom:20}}>For: <strong>{pro.studioName || pro.name}</strong></p>
        <form onSubmit={submit}>
          <div className="input-group" style={{marginBottom:14}}>
            <label>Your Form Code *</label>
            <input required value={form.formNum} onChange={e=>setForm({...form,formNum:e.target.value.toUpperCase()})} placeholder="FRM-XXXXXX"/>
            <span style={{fontSize:11,color:'var(--muted)',marginTop:4,display:'block'}}>This was emailed and texted to you when you submitted your request. Format: FRM-XXXXXX</span>
          </div>
          <div className="input-group" style={{marginBottom:14}}>
            <label>Your Name *</label>
            <input required value={form.clientName} onChange={e=>setForm({...form,clientName:e.target.value})}/>
          </div>
          <div style={{marginBottom:14}}>
            <label style={{fontSize:13,fontWeight:500,color:'var(--muted)',display:'block',marginBottom:8}}>Rating *</label>
            <div style={{display:'flex',gap:8}}>
              {[1,2,3,4,5].map(n=>(
                <button key={n} type="button" onClick={()=>setForm({...form,rating:n})}
                  style={{fontSize:24,background:'none',border:'none',cursor:'pointer',color:n<=form.rating?'var(--gold)':'#ddd'}}>★</button>
              ))}
            </div>
          </div>
          <div className="input-group" style={{marginBottom:20}}>
            <label>Comment</label>
            <textarea rows={4} value={form.comment} onChange={e=>setForm({...form,comment:e.target.value})} placeholder="Share your experience..."/>
          </div>
          <button type="submit" className="btn btn-gold" style={{width:'100%',justifyContent:'center'}}>Submit Review</button>
        </form>
      </div>
    </div>
  );
}

// ─── LEADS LIST PAGE ──────────────────────────────────────────────────────────
function LeadsListPage({ currentUser, setCurrentUser, setPage }) {
  const [leads, setLeads] = useState(store.get('leads') || []);
  const [filter, setFilter] = useState('');
  const ss = store.get('site_settings') || {};
  const maxContacts = ss.maxPhotographersPerLead || 5;

  const refresh = () => setLeads(store.get('leads') || []);

  const activeLeads = leads.filter(l => l.status === 'active' && !(l.contactedBy||[]).includes(currentUser.id));
  const filtered = filter ? activeLeads.filter(l => l.eventType === filter) : activeLeads;

  const buyLead = (lead) => {
    const cost = lead.cost || 10;
    if ((currentUser.points || 0) < cost) { toast(`Not enough points. This lead costs ${cost} pts.`); return; }
    if (window.confirm(`Purchase this lead for ${cost} points?`)) {
      const allLeads = store.get('leads') || [];
      const idx = allLeads.findIndex(l => l.id === lead.id);
      if (idx < 0) return;
      const contacted = [...(allLeads[idx].contactedBy||[]), currentUser.id];
      allLeads[idx].contactedBy = contacted;
      if (contacted.length >= maxContacts) {
        allLeads[idx].status = 'hold';
        allLeads[idx].holdAt = Date.now();
      }
      store.set('leads', allLeads);
      const users = store.get('users') || [];
      const ui = users.findIndex(u => u.id === currentUser.id);
      if (ui >= 0) {
        users[ui].points = (users[ui].points || 0) - cost;
        store.set('users', users);
        setCurrentUser({ ...currentUser, points: users[ui].points });
      }
      refresh();
      toast(`✓ Lead purchased! Client info now visible.`);
    }
  };

  const myLeadIds = leads.filter(l=>(l.contactedBy||[]).includes(currentUser.id)).map(l=>l.id);
  const myLeads = leads.filter(l => myLeadIds.includes(l.id));

  const eventTypes = [...new Set(leads.map(l=>l.eventType).filter(Boolean))];

  return (
    <div style={{maxWidth:800,margin:'0 auto',padding:'32px 20px'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:24,flexWrap:'wrap',gap:12}}>
        <div>
          <h2>Browse Leads</h2>
          <p style={{color:'var(--muted)',fontSize:13}}>{filtered.length} active leads available · {currentUser.points||0} points</p>
        </div>
        <button className="btn btn-gold btn-sm" onClick={()=>setPage('buy-points')}>Buy Points</button>
      </div>
      <div style={{display:'flex',gap:8,marginBottom:20,flexWrap:'wrap'}}>
        <button className="btn btn-sm" style={{background:!filter?'var(--dark)':'transparent',color:!filter?'#fff':'var(--muted)',border:'1.5px solid var(--border)'}} onClick={()=>setFilter('')}>All</button>
        {eventTypes.map(t=><button key={t} className="btn btn-sm" style={{background:filter===t?'var(--dark)':'transparent',color:filter===t?'#fff':'var(--muted)',border:'1.5px solid var(--border)'}} onClick={()=>setFilter(t)}>{t}</button>)}
      </div>

      {filtered.length === 0 && <div className="card" style={{textAlign:'center',padding:'48px'}}>
        <p style={{color:'var(--muted)'}}>No active leads available right now. Check back soon!</p>
      </div>}

      {filtered.map(lead => (
        <div key={lead.id} className="card" style={{marginBottom:12,display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:16,flexWrap:'wrap'}}>
          <div style={{flex:1}}>
            <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:4,flexWrap:'wrap'}}>
              <span className="badge badge-blue">{lead.eventType}</span>
              <span className="badge badge-gray">{lead.eventDate}</span>
              <span className="badge badge-gold">{lead.budget || 'Budget flexible'}</span>
            </div>
            <p style={{fontWeight:500,marginBottom:2}}>{lead.city}, {lead.state}</p>
            <p style={{fontSize:13,color:'var(--muted)'}}>{lead.guestCount ? `${lead.guestCount} guests` : ''}{lead.eventLocation ? ` · ${lead.eventLocation}` : ''}</p>
            <p style={{fontSize:12,color:'var(--muted)',marginTop:4}}>{lead.notes?.slice(0,80)}{lead.notes?.length>80?'...':''}</p>
            <p style={{fontSize:11,color:'#bbb',marginTop:4}}>{(lead.contactedBy||[]).length}/{maxContacts} photographers contacted</p>
          </div>
          <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:8}}>
            <div style={{textAlign:'right'}}>
              <span style={{fontSize:18,fontWeight:700,color:'var(--gold)',display:'block'}}>{lead.cost} pts</span>
              <span style={{fontSize:11,color:'var(--muted)'}}>{lead.eventType==='Wedding'?'Wedding rate':lead.eventType?.includes('Corporate')?'Corporate rate':'Standard rate'}</span>
            </div>
            <button className="btn btn-gold btn-sm" onClick={()=>buyLead(lead)}>Purchase Lead</button>
          </div>
        </div>
      ))}

      {myLeads.length > 0 && <>
        <hr className="divider"/>
        <h3 style={{marginBottom:12}}>Leads I've Purchased</h3>
        {myLeads.map(lead=>(
          <div key={lead.id} className="card" style={{marginBottom:10}}>
            <div style={{display:'flex',justifyContent:'space-between',flexWrap:'wrap',gap:8}}>
              <div>
                <strong>{lead.name}</strong> — {lead.eventType}
                <p style={{fontSize:13,color:'var(--muted)'}}>{lead.city}, {lead.state} · {lead.eventDate}</p>
                <p style={{fontSize:12,marginTop:4}}>📧 {lead.email} · 📞 {lead.phone}</p>
                {lead.address && <p style={{fontSize:12,color:'var(--muted)'}}>{lead.address}, {lead.city} {lead.state} {lead.zip}</p>}
              </div>
              <span className="badge badge-green">✓ Purchased</span>
            </div>
          </div>
        ))}
      </>}
    </div>
  );
}

          <input placeholder="Label" value={pkg.label} onChange={e=>{const p=[...ssForm.pointPackages];p[i]={...p[i],label:e.target.value};setSsForm({...ssForm,pointPackages:p});}} style={{width:90,padding:'7px 10px',border:'1.5px solid #e8dcc8',borderRadius:7,fontSize:13}}/>
          <input type="number" placeholder="Points" value={pkg.points} onChange={e=>{const p=[...ssForm.pointPackages];p[i]={...p[i],points:+e.target.value};setSsForm({...ssForm,pointPackages:p});}} style={{width:70,padding:'7px 10px',border:'1.5px solid #e8dcc8',borderRadius:7,fontSize:13}}/>
          <input type="number" placeholder="Price $" value={pkg.price} onChange={e=>{const p=[...ssForm.pointPackages];p[i]={...p[i],price:+e.target.value};setSsForm({...ssForm,pointPackages:p});}} style={{width:80,padding:'7px 10px',border:'1.5px solid #e8dcc8',borderRadius:7,fontSize:13}}/>
          <select value={pkg.tier||'standard'} onChange={e=>{const p=[...ssForm.pointPackages];p[i]={...p[i],tier:e.target.value};setSsForm({...ssForm,pointPackages:p});}} style={{padding:'7px 8px',border:'1.5px solid #e8dcc8',borderRadius:7,fontSize:12}}>
            <option value="standard">Standard</option><option value="enterprise">Enterprise</option>
          </select>
          <input placeholder="Square pay link" value={pkg.payLink||''} onChange={e=>{const p=[...ssForm.pointPackages];p[i]={...p[i],payLink:e.target.value};setSsForm({...ssForm,pointPackages:p});}} style={{flex:1,minWidth:160,padding:'7px 10px',border:'1.5px solid #e8dcc8',borderRadius:7,fontSize:12}}/>
          <label style={{fontSize:12,display:'flex',alignItems:'center',gap:4}}><input type="checkbox" checked={pkg.popular||false} onChange={e=>{const p=[...ssForm.pointPackages];p[i]={...p[i],popular:e.target.checked};setSsForm({...ssForm,pointPackages:p});}}/> Popular</label>
          <button style={{background:'#fee',color:'#c33',border:'none',borderRadius:6,padding:'4px 8px',cursor:'pointer',fontSize:12}} onClick={()=>{const p=[...ssForm.pointPackages];p.splice(i,1);setSsForm({...ssForm,pointPackages:p});}}>Remove</button>
        </div>
      ))}
      <button className="btn btn-outline btn-sm" style={{marginBottom:20}} onClick={()=>setSsForm({...ssForm,pointPackages:[...(ssForm.pointPackages||[]),{id:Math.random().toString(36).substr(2,9),label:'New',points:100,price:14.99,popular:false}]})}>+ Add Package</button>
      <div/>
      <button className="btn btn-gold" onClick={saveSettings}>Save Packages</button>
    </div>}

    {settingsTab === 'notifications' && <div className="card">
      <h4 style={{marginBottom:16}}>Notification Settings</h4>
      <p style={{fontSize:13,color:'var(--muted)',marginBottom:20}}>Configure how the platform sends notifications to clients and photographers.</p>
      <div className="grid-2" style={{marginBottom:14}}>
        <div className="input-group"><label>Email From Name</label><input value={ssForm.emailFromName||''} onChange={e=>setSsForm({...ssForm,emailFromName:e.target.value})} placeholder="Quoted"/></div>
        <div className="input-group"><label>From Email Address</label><input type="email" value={ssForm.emailFrom||''} onChange={e=>setSsForm({...ssForm,emailFrom:e.target.value})} placeholder="no-reply@quoted.com"/></div>
      </div>
      <div className="input-group" style={{marginBottom:20}}>
        <label>SMS Provider / Note</label>
        <input value={ssForm.smsProvider||''} onChange={e=>setSsForm({...ssForm,smsProvider:e.target.value})} placeholder="Twilio account SID, etc."/>
      </div>
      <div style={{marginBottom:20}}>
        {[
          ['notifyNewLead','Notify photographers of new leads via email'],
          ['notifyReviewRequest','Send review request emails to clients'],
          ['notifyReviewSMS','Send review request texts to clients'],
          ['notifyPointsPurchase','Email receipt on point purchase'],
          ['notifyAdminNewLead','Admin notification on each new lead'],
          ['notifyAdminComplaint','Admin notification on new complaint'],
        ].map(([key, label]) => (
          <label key={key} style={{display:'flex',alignItems:'center',gap:10,marginBottom:10,cursor:'pointer',fontSize:14}}>
            <input type="checkbox" checked={ssForm[key]||false} onChange={e=>setSsForm({...ssForm,[key]:e.target.checked})} style={{accentColor:'var(--gold)',width:16,height:16}}/>
            {label}
          </label>
        ))}
      </div>
      <button className="btn btn-gold" onClick={saveSettings}>Save Notification Settings</button>
    </div>}
  </div>;
}

// ─── ADMIN PANEL ──────────────────────────────────────────────────────────────
function AdminPanel({ setPage }) {
  const [tab, setTab] = useState('dashboard');
  const [search, setSearch] = useState('');
  const [msg, setMsg] = useState('');

  const users = store.get('users') || [];
  const leads = store.get('leads') || [];
  const reviews = store.get('reviews') || [];
  const complaints = store.get('complaints') || [];
  const ss = store.get('site_settings') || {};

  const photographers = users.filter(u => u.role === 'photographer');
  const activeLeads = leads.filter(l => l.status === 'active');

  const searchedUsers = search ? photographers.filter(u =>
    u.name?.toLowerCase().includes(search.toLowerCase()) ||
    u.email?.toLowerCase().includes(search.toLowerCase()) ||
    u.studioName?.toLowerCase().includes(search.toLowerCase())
  ) : photographers;

  const suspend = (uid) => {
    const u = store.get('users') || [];
    const i = u.findIndex(x => x.id === uid);
    if (i >= 0) { u[i].suspended = !u[i].suspended; store.set('users', u); setMsg('Updated'); }
  };

  const feature = (uid) => {
    const u = store.get('users') || [];
    const i = u.findIndex(x => x.id === uid);
    if (i >= 0) { u[i].featured = !u[i].featured; store.set('users', u); setMsg('Updated'); }
  };

  const addPoints = (uid, pts) => {
    const u = store.get('users') || [];
    const i = u.findIndex(x => x.id === uid);
    if (i >= 0) { u[i].points = (u[i].points||0) + pts; store.set('users', u); setMsg(`Added ${pts} points`); }
  };

  const TabBtn = ({t,label}) => <button className="btn btn-sm" style={{background:tab===t?'var(--dark)':'transparent',color:tab===t?'#fff':'var(--muted)',border:'1.5px solid var(--border)'}} onClick={()=>setTab(t)}>{label}</button>;

  const [pointInput, setPointInput] = useState({});

  return (
    <div style={{maxWidth:1000,margin:'0 auto',padding:'32px 20px'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:24}}>
        <h2 style={{color:'var(--dark)'}}>Admin Panel</h2>
        {msg && <span className="badge badge-green">{msg}</span>}
      </div>
      <div style={{display:'flex',gap:8,marginBottom:24,flexWrap:'wrap'}}>
        <TabBtn t="dashboard" label="📊 Dashboard"/>
        <TabBtn t="users" label="👥 Users"/>
        <TabBtn t="leads" label="📋 Leads"/>
        <TabBtn t="complaints" label="⚠️ Complaints"/>
        <TabBtn t="settings" label="⚙️ Settings"/>
      </div>

      {tab === 'dashboard' && <div>
        <div className="grid-3" style={{marginBottom:24}}>
          {[['Total Photographers',photographers.length,''],['Active Leads',activeLeads.length,''],['Total Inquiries',leads.length,''],['Total Reviews',reviews.length,''],['Suspended',photographers.filter(u=>u.suspended).length,''],['Complaints',complaints.length,'']].map(([label,val])=>(
            <div key={label} className="card" style={{textAlign:'center'}}>
              <p style={{fontSize:11,color:'var(--muted)',textTransform:'uppercase',letterSpacing:1,marginBottom:4}}>{label}</p>
              <p style={{fontSize:'2rem',fontWeight:700,color:'var(--gold)',fontFamily:'Playfair Display,serif'}}>{val}</p>
            </div>
          ))}
        </div>
        <div className="card">
          <h3 style={{marginBottom:12}}>Recent Leads</h3>
          {leads.slice(-5).reverse().map(l=>(
            <div key={l.id} style={{padding:'8px 0',borderBottom:'1px solid var(--border)',fontSize:13}}>
              <strong>{l.name}</strong> — {l.eventType} in {l.city}, {l.state} · <span style={{color:'var(--muted)'}}>{l.formNum}</span>
              <span className="badge badge-gray" style={{marginLeft:8}}>{l.status}</span>
            </div>
          ))}
        </div>
      </div>}

      {tab === 'users' && <div>
        <div style={{display:'flex',gap:8,marginBottom:16}}>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search by name, email, or studio..." style={{flex:1,padding:'10px 14px',border:'1.5px solid #e8dcc8',borderRadius:8,fontSize:14}}/>
        </div>
        {searchedUsers.map(u=>(
          <div key={u.id} className="card" style={{marginBottom:10}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:8}}>
              <div>
                <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
                  <strong>{u.studioName || u.name}</strong>
                  {u.suspended && <span className="badge badge-red">Suspended</span>}
                  {u.featured && <span className="badge badge-gold">Featured</span>}
                </div>
                <p style={{fontSize:12,color:'var(--muted)'}}>{u.email} · {u.points||0} pts · Joined {new Date(u.createdAt).toLocaleDateString()}</p>
              </div>
              <div style={{display:'flex',gap:6,flexWrap:'wrap',alignItems:'center'}}>
                <input type="number" placeholder="pts" value={pointInput[u.id]||''} onChange={e=>setPointInput({...pointInput,[u.id]:parseInt(e.target.value)||0})}
                  style={{width:60,padding:'6px 8px',border:'1.5px solid #e8dcc8',borderRadius:6,fontSize:13}}/>
                <button className="btn btn-sm" style={{background:'var(--success)',color:'#fff',border:'none'}} onClick={()=>{addPoints(u.id,pointInput[u.id]||0);setMsg('');setTimeout(()=>setMsg(''),100);}}>Add Pts</button>
                <button className="btn btn-sm" style={{background:u.featured?'#888':'var(--gold)',color:'#fff',border:'none'}} onClick={()=>feature(u.id)}>{u.featured?'Unfeature':'Feature'}</button>
                <button className="btn btn-danger btn-sm" onClick={()=>suspend(u.id)}>{u.suspended?'Unsuspend':'Suspend'}</button>
              </div>
            </div>
          </div>
        ))}
      </div>}

      {tab === 'leads' && <div>
        <p style={{color:'var(--muted)',fontSize:13,marginBottom:16}}>{leads.length} total leads</p>
        {leads.slice().reverse().map(l=>(
          <div key={l.id} className="card" style={{marginBottom:10}}>
            <div style={{display:'flex',justifyContent:'space-between',flexWrap:'wrap',gap:8}}>
              <div>
                <strong>{l.name}</strong> <span style={{color:'var(--muted)',fontSize:12}}>#{l.formNum}</span>
                <p style={{fontSize:12,color:'var(--muted)'}}>{l.email} · {l.phone}</p>
                <p style={{fontSize:12}}>{l.eventType} · {l.city}, {l.state} · {l.eventDate}</p>
                <p style={{fontSize:11,color:'var(--muted)'}}>Contacted by {(l.contactedBy||[]).length} / {ss.maxPhotographersPerLead||5} photographers</p>
              </div>
              <div style={{display:'flex',flexDirection:'column',gap:4,alignItems:'flex-end'}}>
                <span className={`badge ${l.status==='active'?'badge-green':l.status==='hold'?'badge-gold':'badge-red'}`}>{l.status}</span>
                <span style={{fontSize:11,color:'var(--muted)'}}>{l.cost} pts</span>
              </div>
            </div>
          </div>
        ))}
      </div>}

      {tab === 'complaints' && <div>
        <ComplaintAdmin/>
      </div>}

      {tab === 'settings' && <SettingsAdmin/>}
    </div>
  );
}

function ComplaintAdmin() {
  const [form, setForm] = useState({type:'client',subject:'',message:'',email:''});
  const [submitted, setSubmitted] = useState(false);
  const complaints = store.get('complaints') || [];

  const submit = (e) => {
    e.preventDefault();
    const c = store.get('complaints') || [];
    c.push({...form, id: genId(), createdAt: Date.now(), status: 'open'});
    store.set('complaints', c);
    setSubmitted(true);
  };

  return (
    <div>
      <h3 style={{marginBottom:16}}>Complaints & Requests ({complaints.length})</h3>
      {complaints.length === 0 && <div className="card"><p style={{color:'var(--muted)',fontSize:13}}>No complaints or requests yet.</p></div>}
      {complaints.slice().reverse().map(c=>(
        <div key={c.id} className="card" style={{marginBottom:10}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4,flexWrap:'wrap',gap:8}}>
            <div style={{display:'flex',gap:8,alignItems:'center'}}>
              <span className="badge badge-blue">{c.type}</span>
              <strong style={{fontSize:14}}>{c.subject}</strong>
            </div>
            <span style={{fontSize:11,color:'var(--muted)'}}>{new Date(c.createdAt).toLocaleDateString()}</span>
          </div>
          <p style={{fontSize:13,color:'var(--muted)'}}>{c.email}</p>
          <p style={{fontSize:13,marginTop:4}}>{c.message}</p>
        </div>
      ))}
    </div>
  );
}

// ─── CONTACT / COMPLAINT FORM ─────────────────────────────────────────────────
function ContactPage() {
  const [form, setForm] = useState({type:'client',subject:'',message:'',email:''});
  const [done, setDone] = useState(false);

  const submit = (e) => {
    e.preventDefault();
    const c = store.get('complaints') || [];
    c.push({...form, id: genId(), createdAt: Date.now(), status: 'open'});
    store.set('complaints', c);
    setDone(true);
  };

  if (done) return <div style={{maxWidth:440,margin:'60px auto',padding:'0 20px',textAlign:'center'}}>
    <div className="card"><div style={{fontSize:40,marginBottom:12}}>✉️</div><h2>Message sent!</h2><p style={{color:'var(--muted)',marginTop:8}}>We'll get back to you as soon as possible.</p></div>
  </div>;

  return (
    <div style={{maxWidth:480,margin:'40px auto',padding:'0 20px'}}>
      <div className="card">
        <h2 style={{marginBottom:20}}>Contact Us</h2>
        <form onSubmit={submit}>
          <div className="input-group" style={{marginBottom:14}}>
            <label>Type</label>
            <select value={form.type} onChange={e=>setForm({...form,type:e.target.value})}>
              <option value="client">Client Inquiry</option>
              <option value="complaint">Complaint</option>
              <option value="photographer-dispute">Photographer Dispute</option>
              <option value="photographer-request">Photographer Request</option>
              <option value="other">Other</option>
            </select>
          </div>
          <div className="input-group" style={{marginBottom:14}}>
            <label>Your Email *</label><input required type="email" value={form.email} onChange={e=>setForm({...form,email:e.target.value})}/>
          </div>
          <div className="input-group" style={{marginBottom:14}}>
            <label>Subject *</label><input required value={form.subject} onChange={e=>setForm({...form,subject:e.target.value})}/>
          </div>
          <div className="input-group" style={{marginBottom:20}}>
            <label>Message *</label><textarea required rows={5} value={form.message} onChange={e=>setForm({...form,message:e.target.value})}/>
          </div>
          <button type="submit" className="btn btn-gold" style={{width:'100%',justifyContent:'center'}}>Send Message</button>
        </form>
      </div>
    </div>
  );
}

// ─── APP ROOT ─────────────────────────────────────────────────────────────────
function App() {
  initData();
  const [page, setPage] = useState('home');
  const [resetToken, setResetToken] = useState(null);
  // Restore session if user had "remember me" checked
  const [currentUser, setCurrentUser] = useState(() => {
    try { return verifySession(); } catch { return null; }
  });
  const [currentLead, setCurrentLead] = useState(null);
  const [viewingPro, setViewingPro] = useState(null);

  // Check for review link in URL
  useEffect(() => {
    const params = new URLSearchParams(window.location.search);
    const reviewId = params.get('review');
    const resetToken = params.get('reset');
    if (reviewId) {
      setViewingPro({ id: reviewId });
      setPage('submit-review');
      return;
    }
    if (resetToken) {
      // Validate token exists and isn't expired (1 hour)
      const resets = store.get('pw_resets') || [];
      const entry = resets.find(r => r.token === resetToken && !r.used);
      if (entry && Date.now() - entry.createdAt < 60 * 60 * 1000) {
        setResetToken(resetToken);
        setPage('reset-password');
      } else {
        toast('This reset link has expired or already been used. Please request a new one.');
        setPage('pro-login');
      }
      // Clean URL
      window.history.replaceState({}, '', window.location.pathname);
      return;
    }
    // Auto-redirect logged-in users
    if (currentUser) {
      if (currentUser.role === 'admin') setPage('admin');
      else if (currentUser.role === 'photographer') setPage('pro-dashboard');
    }
  }, []);

  const logout = () => {
    store.set('quoted_session', null);
    localStorage.removeItem('login_attempts');
    setCurrentUser(null);
    setPage('home');
    toast('Logged out successfully');
  };

  // Lead hold/delete cleanup
  useEffect(() => {
    const ss = store.get('site_settings') || {};
    const holdMs = (ss.leadHoldDays || 14) * 24 * 60 * 60 * 1000;
    const leads = store.get('leads') || [];
    const now = Date.now();
    const updated = leads.filter(l => {
      if (l.status === 'hold' && l.holdAt && (now - l.holdAt) > holdMs) return false;
      return true;
    });
    if (updated.length !== leads.length) store.set('leads', updated);
  }, [page]);

  return (
    <div>
      <Toast/>
      <Nav page={page} setPage={setPage} currentUser={currentUser} onLogout={logout}/>
      {/* Footer nav links */}
      {page !== 'home' && page !== 'admin' && (
        <div style={{background:'var(--dark)',padding:'8px 32px',display:'flex',gap:16,alignItems:'center'}}>
          <span style={{fontSize:12,color:'rgba(255,255,255,0.5)',cursor:'pointer'}} onClick={()=>setPage('contact')}>Contact / Complaints</span>
          <span style={{fontSize:12,color:'rgba(255,255,255,0.5)',cursor:'pointer'}} onClick={()=>setPage('photographers')}>Browse Photographers</span>
        </div>
      )}
      {page === 'home' && <HomePage setPage={setPage} setCurrentLead={setCurrentLead}/>}
      {page === 'photographers' && <PhotographersPage setPage={setPage} setViewingPro={setViewingPro}/>}
      {page === 'pro-profile' && viewingPro && <ProProfilePage pro={viewingPro} setPage={setPage}/>}
      {page === 'pro-login' && <ProAuthPage setPage={setPage} setCurrentUser={setCurrentUser}/>}
      {page === 'reset-password' && <ResetPasswordPage token={resetToken} setPage={setPage}/>}
      {page === 'pro-dashboard' && currentUser?.role==='photographer' && <ProDashboard currentUser={currentUser} setCurrentUser={setCurrentUser} setPage={setPage}/>}
      {page === 'leads-list' && currentUser?.role==='photographer' && <LeadsListPage currentUser={currentUser} setCurrentUser={setCurrentUser} setPage={setPage}/>}
      {page === 'buy-points' && currentUser?.role==='photographer' && <BuyPointsPage currentUser={currentUser} setCurrentUser={setCurrentUser}/>}
      {page === 'admin' && currentUser?.role==='admin' && <AdminPanel setPage={setPage}/>}
      {page === 'contact' && <ContactPage/>}
      {page === 'submit-review' && viewingPro && <ReviewPage photographerId={viewingPro.id} setPage={setPage}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
